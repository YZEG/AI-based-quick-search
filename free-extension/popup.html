<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Dictionary</title>
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    h3 {
      font-size: 17px;
      font-weight: 600;
      color: #333;
      margin-bottom: 14px;
      text-align: center;
    }
    .usage {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
    .usage li {
      margin-bottom: 8px;
    }
    .tip {
      margin-top: 12px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Hover Dictionary</h3>
    <ul class="usage">
      <li><strong>1.</strong> Select any word on a webpage</li>
      <li><strong>2.</strong> A popup window will appear</li>
      <li><strong>3.</strong> Click "Get Definition" to see meaning</li>
      <li><strong>4.</strong> Drag the window anywhere</li>
    </ul>
    <div class="tip">
      ?? Tip: Click outside to close the popup
    </div>
  </div>
</body>
</html>
